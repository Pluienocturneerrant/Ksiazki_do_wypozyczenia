<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Książki do wypożyczenia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Georgia, serif;
            background: #111827;
            color: white;
            padding: 1rem;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1024px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .sync-info {
            background: #1e40af;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .sync-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .sync-btn {
            padding: 0.5rem 1rem;
            background: #2563eb;
            border: none;
            border-radius: 0.5rem;
            color: white;
            cursor: pointer;
            font-family: Georgia, serif;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .sync-btn:hover {
            background: #1d4ed8;
        }

        .sync-btn.danger {
            background: #dc2626;
            font-size: 0.75rem;
            padding: 0.4rem 0.75rem;
        }

        .sync-btn.danger:hover {
            background: #b91c1c;
        }
        
        .stats {
            background: #1f2937;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            text-align: center;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.875rem;
            color: #9ca3af;
            margin-top: 0.25rem;
        }
        
        .blue { color: #60a5fa; }
        .yellow { color: #fbbf24; }
        
        .search-box {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: #1f2937;
            border: none;
            border-radius: 0.5rem;
            color: white;
            font-size: 1rem;
            font-family: Georgia, serif;
        }
        
        .search-box input::placeholder {
            color: #9ca3af;
        }
        
        .search-box input:focus {
            outline: 2px solid #3b82f6;
        }
        
        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        
        .book-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .book-item {
            background: #1f2937;
            border-radius: 0.5rem;
            padding: 1rem;
        }
        
        .book-item.empty {
            border: 2px dashed #4b5563;
        }
        
        .book-content {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .book-row {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .book-number {
            width: 3rem;
            height: 3rem;
            background: #374151;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            flex-shrink: 0;
            color: #9ca3af;
        }
        
        .book-title-container {
            flex-grow: 1;
            min-width: 0;
        }
        
        .book-title {
            font-size: 1.125rem;
            padding: 0.5rem;
            margin: -0.5rem;
            border-radius: 0.25rem;
            cursor: pointer;
            word-wrap: break-word;
        }
        
        .book-title:hover {
            background: #374151;
        }
        
        .book-title.empty {
            color: #6b7280;
            font-style: italic;
        }
        
        .book-edit input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            background: #374151;
            border: none;
            border-radius: 0.25rem;
            color: white;
            font-size: 1rem;
            font-family: Georgia, serif;
            margin-bottom: 0.5rem;
        }
        
        .book-edit input:focus {
            outline: 2px solid #3b82f6;
        }
        
        .book-buttons {
            display: flex;
            gap: 0.5rem;
        }
        
        .btn {
            flex: 1;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.25rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            font-family: Georgia, serif;
        }
        
        .btn-save {
            background: #16a34a;
            color: white;
        }
        
        .btn-save:hover {
            background: #15803d;
        }
        
        .btn-cancel {
            background: #4b5563;
            color: white;
        }
        
        .btn-cancel:hover {
            background: #374151;
        }

        .book-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            padding-left: 3.75rem;
        }
        
        .btn-delete {
            flex-shrink: 0;
            padding: 0.5rem 0.75rem;
            background: #374151;
            border: none;
            color: #f87171;
            cursor: pointer;
            border-radius: 0.5rem;
            font-size: 1.125rem;
        }
        
        .btn-delete:hover {
            background: #4b5563;
            color: #fca5a5;
        }
        
        .success-message, .error-message {
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
        }

        .success-message {
            background: #16a34a;
            color: white;
        }
        
        .error-message {
            background: #dc2626;
            color: white;
        }
        
        .no-results {
            text-align: center;
            color: #9ca3af;
            padding: 3rem 0;
        }
        
        .loading {
            text-align: center;
            font-size: 1.25rem;
            padding: 3rem 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1f2937;
            padding: 1.5rem;
            border-radius: 0.5rem;
            max-width: 500px;
            width: 100%;
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }

        .modal textarea {
            width: 100%;
            height: 200px;
            background: #374151;
            border: none;
            border-radius: 0.5rem;
            color: white;
            padding: 0.75rem;
            font-family: monospace;
            font-size: 0.875rem;
            margin-bottom: 1rem;
        }

        .modal-buttons {
            display: flex;
            gap: 0.5rem;
        }

        @media (min-width: 640px) {
            body {
                padding: 1.5rem;
            }
            h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 Książki do wypożyczenia</h1>

        <div class="sync-info">
            💾 Dane zapisują się automatycznie w przeglądarce. Użyj eksportu/importu do synchronizacji między urządzeniami.
        </div>

        <div class="sync-buttons">
            <button class="sync-btn" onclick="sendEmail()">📧 Wyślij emailem</button>
            <button class="sync-btn" onclick="copyToClipboard()">📋 Skopiuj dane</button>
            <button class="sync-btn" onclick="exportData()">📤 Pobierz plik</button>
            <button class="sync-btn" onclick="showImportModal()">📥 Importuj dane</button>
            <button class="sync-btn danger" onclick="resetData()" style="margin-left: auto;">⚠️ Reset</button>
        </div>
        
        <div id="success" class="success-message" style="display: none;"></div>
        <div id="error" class="error-message" style="display: none;"></div>
        
        <div class="stats">
            <div>
                <div class="stat-value blue" id="filled-count">0</div>
                <div class="stat-label">Książek</div>
            </div>
            <div>
                <div class="stat-value yellow" id="empty-count">0</div>
                <div class="stat-label">Pustych pól</div>
            </div>
        </div>
        
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="search" placeholder="Szukaj książki...">
        </div>
        
        <div id="loading" class="loading">Ładowanie...</div>
        <div id="book-list" class="book-list" style="display: none;"></div>
        <div id="no-results" class="no-results" style="display: none;">
            Nie znaleziono książek pasujących do wyszukiwania
        </div>
    </div>

    <!-- Modal importu -->
    <div id="import-modal" class="modal">
        <div class="modal-content">
            <div class="modal-title">Importuj dane</div>
            <textarea id="import-textarea" placeholder="Wklej tutaj wyeksportowane dane..."></textarea>
            <div class="modal-buttons">
                <button class="btn btn-save" onclick="importData()">Importuj</button>
                <button class="btn btn-cancel" onclick="hideImportModal()">Anuluj</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'books-to-rent-v1';

        const initialData = Array(50).fill("");

        let books = [];
        let editingId = null;
        let searchTerm = '';

        function loadData() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    books = JSON.parse(saved);
                } else {
                    books = [...initialData];
                    saveToStorage();
                }
            } catch (err) {
                console.error('Error loading data:', err);
                books = [...initialData];
            }
            document.getElementById('loading').style.display = 'none';
            document.getElementById('book-list').style.display = 'flex';
            render();
        }

        function saveToStorage() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
            } catch (err) {
                showError('Błąd zapisu: ' + err.message);
            }
        }

        function showSuccess(message) {
            const el = document.getElementById('success');
            el.textContent = message;
            el.style.display = 'block';
            setTimeout(() => {
                el.style.display = 'none';
            }, 3000);
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 3000);
        }

        function updateStats() {
            const filled = books.filter(b => b && b.trim()).length;
            const empty = books.length - filled;
            
            document.getElementById('filled-count').textContent = filled;
            document.getElementById('empty-count').textContent = empty;
        }

        function getFilteredBooks() {
            if (!searchTerm) {
                return books.map((title, idx) => ({ idx, title }));
            }
            return books.map((title, idx) => ({ idx, title }))
                .filter(item => item.title.toLowerCase().includes(searchTerm.toLowerCase()));
        }

        function render() {
            updateStats();
            const filtered = getFilteredBooks();
            const listEl = document.getElementById('book-list');
            const noResultsEl = document.getElementById('no-results');
            
            const hasResults = filtered.length > 0;
            
            listEl.style.display = hasResults ? 'flex' : 'none';
            noResultsEl.style.display = hasResults ? 'none' : 'block';

            if (!hasResults) return;

            listEl.innerHTML = filtered.map(({ idx, title }) => {
                const isEmpty = !title || title.trim() === '';
                const isCurrentlyEditing = editingId === idx;

                if (isCurrentlyEditing) {
                    return `
                        <div class="book-item ${isEmpty ? 'empty' : ''}">
                            <div class="book-content">
                                <div class="book-row">
                                    <div class="book-number">${idx + 1}</div>
                                    <div class="book-title-container">
                                        <div class="book-edit">
                                            <input type="text" id="edit-input-${idx}" value="${title}" placeholder="Wpisz tytuł książki...">
                                            <div class="book-buttons">
                                                <button class="btn btn-save" onclick="saveEdit(${idx})">Zapisz</button>
                                                <button class="btn btn-cancel" onclick="cancelEdit()">Anuluj</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                }

                return `
                    <div class="book-item ${isEmpty ? 'empty' : ''}">
                        <div class="book-content">
                            <div class="book-row">
                                <div class="book-number">${idx + 1}</div>
                                <div class="book-title-container">
                                    <div class="book-title ${isEmpty ? 'empty' : ''}" onclick="startEdit(${idx})">
                                        ${isEmpty ? 'Kliknij aby dodać tytuł...' : title}
                                    </div>
                                </div>
                            </div>
                            ${!isEmpty ? `
                                <div class="book-actions">
                                    <button class="btn-delete" onclick="deleteBook(${idx})">🗑️ Usuń</button>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            if (editingId !== null) {
                const input = document.getElementById(`edit-input-${editingId}`);
                if (input) input.focus();
            }
        }

        function startEdit(idx) {
            editingId = idx;
            render();
        }

        function cancelEdit() {
            editingId = null;
            render();
        }

        function saveEdit(idx) {
            const input = document.getElementById(`edit-input-${idx}`);
            if (input) {
                books[idx] = input.value.trim();
                saveToStorage();
                showSuccess('Zapisano!');
            }
            editingId = null;
            render();
        }

        function deleteBook(idx) {
            if (confirm('Czy na pewno usunąć tę książkę?')) {
                books[idx] = '';
                saveToStorage();
                showSuccess('Usunięto!');
                render();
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(books);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ksiazki-do-wypozyczenia-' + new Date().toISOString().split('T')[0] + '.json';
            a.click();
            URL.revokeObjectURL(url);
            showSuccess('Plik pobrany!');
        }

        function sendEmail() {
            const dataStr = JSON.stringify(books);
            const subject = encodeURIComponent('Książki do wypożyczenia - synchronizacja');
            const body = encodeURIComponent(dataStr);
            const mailtoLink = `mailto:vihmasajuoorander@gmail.com?subject=${subject}&body=${body}`;
            window.location.href = mailtoLink;
            showSuccess('Otwieranie klienta email...');
        }

        function copyToClipboard() {
            const dataStr = JSON.stringify(books);
            navigator.clipboard.writeText(dataStr).then(() => {
                showSuccess('Dane skopiowane do schowka! (' + dataStr.length + ' znaków)');
            }).catch(err => {
                showError('Błąd kopiowania: ' + err.message);
            });
        }

        function showImportModal() {
            document.getElementById('import-modal').classList.add('active');
        }

        function hideImportModal() {
            document.getElementById('import-modal').classList.remove('active');
            document.getElementById('import-textarea').value = '';
        }

        function importData() {
            const data = document.getElementById('import-textarea').value.trim();
            
            if (!data) {
                showError('Pole importu jest puste. Wklej dane przed importem.');
                return;
            }
            
            try {
                const parsed = JSON.parse(data);
                
                if (!Array.isArray(parsed)) {
                    throw new Error('Nieprawidłowa struktura danych');
                }
                
                books = parsed;
                saveToStorage();
                hideImportModal();
                render();
                showSuccess('Dane zaimportowane pomyślnie!');
            } catch (err) {
                console.error('Import error:', err);
                showError('Błąd importu: nieprawidłowy format danych. Upewnij się, że skopiowałeś pełne dane z emaila.');
            }
        }

        function resetData() {
            if (confirm('⚠️ UWAGA! Czy na pewno zresetować bazę do stanu początkowego?\n\nWszystkie Twoje zmiany zostaną bezpowrotnie utracone!\n\nJeśli chcesz zachować dane, najpierw je wyeksportuj.')) {
                books = [...initialData];
                saveToStorage();
                render();
                showSuccess('Baza zresetowana do stanu początkowego');
            }
        }

        document.getElementById('search').addEventListener('input', (e) => {
            searchTerm = e.target.value;
            render();
        });

        loadData();
    </script>
</body>
</html>
